<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunder Mifflin Paper Company</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            background-color: #87CEEB;
            font-family: Arial, sans-serif;
            text-align: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header-text {
            font-size: 28px;
            font-weight: bold;
            color: #000;
            margin-bottom: 40px;
        }
        
        .logo {
            background-color: #4169E1;
            color: white;
            padding: 15px 30px;
            margin: 40px auto;
            display: inline-block;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .construction-worker {
            margin: 60px 0;
            font-size: 80px;
            line-height: 1;
        }
        
        .footer-text {
            font-size: 24px;
            font-weight: bold;
            color: #000;
            margin-top: 40px;
        }
        
        .christmas {
            color: #8B0000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-text">Under Construction</div>
        
        <div class="logo">
            Dunder<br>
            Mifflin<br>
            <div style="font-size: 12px; margin-top: 5px;">PAPER COMPANY</div>
        </div>
        
        <div class="construction-worker">
            🚧👷‍♂️🚧
        </div>
        
        <div class="footer-text">
            Coming <span class="christmas">Christmas</span> 2002!
        </div>
    </div>
</body>
</html>
